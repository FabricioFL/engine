<div id="options-bg">
    <div id="options-container">
        <div id="options-title">OPTIONS</div>
        <div id="opt-screen-row" class="opt-row">
            <div id="opt-screen-label" class="opt-label">Screen Mode</div>
            <div id="btn-screen-mode" class="opt-value">Windowed</div>
        </div>
        <div id="opt-res-row" class="opt-row">
            <div id="opt-res-label" class="opt-label">Resolution</div>
            <div id="btn-resolution" class="opt-value">800x600</div>
        </div>
        <div id="opt-invert-row" class="opt-row">
            <div id="opt-invert-label" class="opt-label">Invert Mouse</div>
            <div id="btn-invert-mouse" class="opt-value">Off</div>
        </div>
        <div id="opt-vol-row" class="opt-row">
            <div id="opt-vol-label" class="opt-label">Volume</div>
            <div id="volume-bar-bg" class="opt-bar-bg">
                <div id="volume-bar-fill" class="opt-bar-fill"></div>
            </div>
        </div>
        <div id="opt-buttons" class="opt-row">
            <div id="btn-vol-down" class="opt-small-btn">-</div>
            <div id="btn-vol-up" class="opt-small-btn">+</div>
        </div>
        <div id="btn-options-back" class="opt-btn">Back</div>
    </div>
</div>
